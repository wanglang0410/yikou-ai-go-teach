apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: yikou-ai
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
      containers:
        - name: backend
          image: yikou-ai-go-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
          env:
            - name: APP_ENV
              value: k8s
            - name: TZ
              value: Asia/Shanghai
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AI_API_KEY
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: code-output
              mountPath: /src/tmp/code_output
          readinessProbe:
            httpGet:
              path: /api/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: code-output
          persistentVolumeClaim:
            claimName: backend-code-output-pvc
