apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yikou-ai

resources:
  - namespace.yaml
  - mysql-secret.yaml
  - mysql-configmap.yaml
  - mysql-pvc.yaml
  - mysql-deployment.yaml
  - mysql-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - backend-secret.yaml
  - backend-pvc.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: yikou-ai
    includeSelectors: false

images:
  - name: yikou-ai-go-backend
    newName: yikou-ai-go-backend
    newTag: latest
  - name: yikou-ai-go-frontend
    newName: yikou-ai-go-frontend
    newTag: latest
