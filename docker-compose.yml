services:
  mysql:
    image: mysql:8.0
    container_name: yikou-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-yikou123456}
      MYSQL_DATABASE: yikou_ai
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: yikou-ai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yikou-ai-backend
    restart: unless-stopped
    environment:
      AI_API_KEY: ${AI_API_KEY:-}
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_PORT:-8123}:8123"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - code_output:/src/tmp/code_output

  frontend:
    build:
      context: ./yikou-ai-feiwu-front
      dockerfile: Dockerfile
    container_name: yikou-ai-frontend
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://backend:8123
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  code_output:
